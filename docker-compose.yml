services:
  web:
    build: .
    volumes:
      - .:/app
      - hf_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: sh -c "npm install && npm run dev -- --host"

  ai:
    build: ./ai_server
    volumes:
      - ./ai_server:/app
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # [이 부분 추가] 서버 실행 -> 5초 대기(부팅) -> 모델 다운로드 -> 서버 유지
    entrypoint: >
      /bin/sh -c " ollama serve &  sleep 5; ollama pull llama3.2; wait"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
  # ngrok:
  #   image: ngrok/ngrok:latest
  #   restart: unless-stopped
  #   environment:
  #     NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
  #   depends_on:
  #     - frontend

volumes:
  ollama_data:
  hf_cache:
